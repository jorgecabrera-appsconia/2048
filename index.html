<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 - Réplica Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1 class="logo">2048</h1>
            <div class="scores-container">
                <div class="score-box">
                    <span class="score-label">PUNTOS</span>
                    <span class="score-value" id="score">0</span>
                    <div class="score-addition" id="score-addition"></div>
                </div>
                <div class="score-box">
                    <span class="score-label">MEJOR</span>
                    <span class="score-value" id="best-score">0</span>
                </div>
            </div>
        </header>

        <div class="game-intro">
            <p>¡Une los números para llegar a la <strong>casilla 2048!</strong></p>
            <button class="btn-primary" id="restart-btn">Nuevo Juego</button>
        </div>

        <div class="game-container">
            <div class="game-message" id="game-message">
                <p id="message-text">¡Juego Terminado!</p>
                <div class="lower">
                    <button class="btn-primary" id="retry-btn">Intentar de nuevo</button>
                </div>
            </div>

            <div class="grid-container" id="grid">
                <!-- 16 grid cells will be automatically generated by JS -->
            </div>

            <div class="tile-container" id="tile-container">
                <!-- Tiles will be appended here -->
            </div>
        </div>

        <div class="game-explanation">
            <p><strong class="important">Cómo jugar:</strong> Usa las <strong>flechas de dirección</strong> o
                <strong>desliza</strong> para mover las casillas. Las casillas con el mismo número se fusionan al
                tocarse. ¡Súmalas para llegar a <strong>2048!</strong></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
